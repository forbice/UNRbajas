<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baja de Estudiantes - UNR (Nube de Focos)</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Inter:wght@400;600&family=Libre+Baskerville&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #064889;
      --grid-color: rgba(255, 255, 255, 0.5);
      --panel-bg: rgba(4, 34, 70, 0.95);
      --text-main: #f0f4ff;
      --active-color: #e6691b;
      --inactive-color: #888888;
      
      --font-ui: 'Inter', sans-serif;
      --font-hand: 'Caveat', 'Gill Sans Nova', 'Gill Sans', Calibri, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body, html {
      width: 100%; 
      height: 100%;
      overflow: hidden;
      font-family: var(--font-ui);
      background-color: var(--bg-color);
      background-image: 
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 50px 50px;
      color: var(--text-main);
    }

    /* HEADER FIJO */
    #top-header {
      position: fixed;
      top: 0; left: 0; width: 100%;
      height: 70px;
      background: rgba(4, 34, 70, 0.85);
      backdrop-filter: blur(4px);
      border-bottom: 1px solid var(--grid-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      z-index: 500;
    }

    .nav-btn {
      background: none; border: none; color: var(--text-main);
      font-size: 2rem; font-weight: 300; cursor: pointer;
      padding: 0 15px; transition: color 0.2s, transform 0.2s;
    }
    .nav-btn:hover { color: var(--active-color); transform: scale(1.1); }

    .header-center {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      flex: 1; overflow: hidden;
    }

    #faculty-title {
      height: 35px; display: flex; align-items: center; justify-content: center; width: 100%;
    }
    #faculty-title svg {
      max-height: 100%; max-width: 100%;
      font-family: 'Old Press', 'Libre Baskerville', serif !important; 
    }

    .counters {
      font-size: 0.75rem; font-weight: 600; margin-top: 5px;
      display: flex; gap: 20px; letter-spacing: 1px;
    }
    .c-activos { color: var(--active-color); }
    .c-inactivos { color: #cccccc; }

    /* CONTENEDOR DE LA NUBE */
    #cloud-area {
      position: absolute;
      top: 70px; width: 100vw; height: calc(100vh - 150px);
      overflow: hidden;
    }

    /* EL FOCO */
    .foco-wrapper {
      position: absolute;
      width: 20px;
      height: 35px;
      cursor: pointer;
      transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s;
      transform-origin: center center;
      transform: translate(-50%, -50%) scale(1);
    }

    .foco-wrapper svg {
      width: 100%; height: 100%; display: block; pointer-events: none;
    }

    .foco-wrapper.inactivo { opacity: 0.7; }

    /* Hover */
    .foco-wrapper:hover, .foco-wrapper.hovered {
      z-index: 100;
      transform: translate(-50%, -50%) scale(5); 
      filter: drop-shadow(0 0 2px rgba(230, 105, 27, 0.8));
      opacity: 1;
    }
    
    .foco-wrapper.inactivo:hover {
      filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.6));
    }

    /* TOOLTIP MANUSCRITO */
    #tooltip {
      position: fixed; background: #fdfbf7; color: #1a1a1a;
      padding: 15px 25px; width: max-content; max-width: 280px;
      pointer-events: none; opacity: 0; visibility: hidden;
      transition: opacity 0.15s ease; z-index: 1000;
      box-shadow: 3px 5px 15px rgba(0,0,0,0.4);
      border-radius: 2px 5px 3px 4px; 
      border-left: 5px solid var(--active-color);
    }
    #tooltip.show { opacity: 1; visibility: visible; }
    #tooltip.inactivo-style { border-left: 5px solid var(--inactive-color); }
    
    .tt-nombre {
      font-family: var(--font-ui); font-weight: 600; font-size: 0.65rem;
      text-transform: uppercase; letter-spacing: 1px; color: #666;
      margin-bottom: 2px; display: block;
    }
    
    .tt-frase {
      font-family: var(--font-hand); font-size: 1.6rem; line-height: 1.1; color: #111;
    }

    /* PANEL INFERIOR Y FORMULARIO */
    #bottom-panel {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 80px;
      background: var(--panel-bg); border-top: 1px solid var(--grid-color);
      display: flex; justify-content: center; align-items: center;
      padding: 0 20px; z-index: 500; backdrop-filter: blur(5px);
    }

    #form-experiencia {
      display: flex; gap: 15px; align-items: center; width: 100%; max-width: 900px;
    }

    .input-group {
      display: flex; gap: 10px; flex: 1;
    }

    .input-group input {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
      color: #fff; padding: 10px 12px; border-radius: 4px;
      font-family: var(--font-ui); font-size: 0.9rem; outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus { border-color: var(--active-color); }
    .input-group input::placeholder { color: rgba(255,255,255,0.5); }
    
    #input-nombre { flex: 1; max-width: 140px; }
    #input-edad { width: 70px; }
    #input-frase { flex: 2; }

    /* TOGGLE SWITCH */
    .toggle-container {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.85rem; font-weight: 600; color: rgba(255,255,255,0.8);
    }
    .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background-color: var(--inactive-color); transition: .4s; border-radius: 34px;
    }
    .slider:before {
      position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px;
      background-color: white; transition: .4s; border-radius: 50%;
    }
    input:checked + .slider { background-color: var(--active-color); }
    input:checked + .slider:before { transform: translateX(24px); }

    #form-experiencia button {
      background: var(--active-color); color: #fff; border: none;
      padding: 11px 20px; border-radius: 4px; font-family: var(--font-ui);
      font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    #form-experiencia button:hover { background: #ff7d2b; }

    @media (max-width: 768px) {
      #top-header { height: 90px; padding: 10px; align-items: flex-start; }
      .nav-btn { margin-top: 15px; }
      #cloud-area { top: 90px; height: calc(100vh - 250px); }
      #bottom-panel { height: auto; padding: 15px; }
      #form-experiencia { flex-direction: column; gap: 15px; }
      .input-group { flex-wrap: wrap; width: 100%; }
      #input-nombre { flex: 1; max-width: none; }
      #input-edad { width: 80px; }
      #input-frase { width: 100%; }
      .toggle-container { width: 100%; justify-content: center; }
      #form-experiencia button { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- CABECERA FIJA -->
  <header id="top-header">
    <button class="nav-btn" id="btn-prev">&lt;</button>
    <div class="header-center">
      <div id="faculty-title"></div>
      <div class="counters">
        <span class="c-activos">ACTIVOS: <span id="count-activos"></span></span>
        <span class="c-inactivos">INACTIVOS: <span id="count-inactivos"></span></span>
      </div>
    </div>
    <button class="nav-btn" id="btn-next">&gt;</button>
  </header>

  <!-- CONTENEDOR DE LA NUBE -->
  <div id="cloud-area"></div>

  <!-- TOOLTIP FLOTANTE -->
  <div id="tooltip">
    <span class="tt-nombre" id="tt-nombre"></span>
    <p class="tt-frase" id="tt-frase"></p>
  </div>

  <!-- PANEL INFERIOR -->
  <div id="bottom-panel">
    <form id="form-experiencia">
      <div class="input-group">
        <input type="text" id="input-nombre" placeholder="Nombre" required>
        <input type="number" id="input-edad" placeholder="Edad" required min="17" max="99">
        <input type="text" id="input-frase" placeholder="Contá tu experiencia en la UNR" autocomplete="off" required>
      </div>
      
      <div class="toggle-container">
        <span>Inactivo</span>
        <label class="switch">
          <input type="checkbox" id="input-estado" checked>
          <span class="slider"></span>
        </label>
        <span>Activo</span>
      </div>
      <button type="submit">Sumar</button>
    </form>
  </div>

    // 3. ESTADO Y REFERENCIAS
    let currentFacIndex = 0;
    const TOTAL_INITIAL_NODES = 1500; 
    
    const cloudArea = document.getElementById('cloud-area');
    const tooltip = document.getElementById('tooltip');
    const ttNombre = document.getElementById('tt-nombre');
    const ttFrase = document.getElementById('tt-frase');

    const titleContainer = document.getElementById('faculty-title');
    const countActivos = document.getElementById('count-activos');
    const countInactivos = document.getElementById('count-inactivos');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');

    // 4. LÓGICA DE INTERFAZ
    function init() { renderFaculty(); }

    function renderFaculty() {
      const fac = facultades[currentFacIndex];
      titleContainer.innerHTML = fac.svg;
      countActivos.textContent = fac.activos;
      countInactivos.textContent = fac.inactivos;

      cloudArea.innerHTML = '';
      generateCloud(fac);
    }

    function generateCloud(fac) {
      const rect = cloudArea.getBoundingClientRect();
      const ratioActivos = fac.activos / (fac.activos + fac.inactivos);
      const fragment = document.createDocumentFragment();

      for(let i = 0; i < TOTAL_INITIAL_NODES; i++) {
        const isActivo = Math.random() < ratioActivos;
        
        const pool = isActivo ? fac.testimoniosActivos : fac.testimoniosInactivos;
        const testimonio = pool[Math.floor(Math.random() * pool.length)];

        const foco = createFocoDOM(testimonio, isActivo, rect);
        fragment.appendChild(foco);
      }

      cloudArea.appendChild(fragment);
    }

    function createFocoDOM(testimonio, isActivo, rect) {
      const foco = document.createElement('div');
      foco.className = `foco-wrapper ${isActivo ? 'activo' : 'inactivo'}`;
      
      // INYECCIÓN DE SVG DIRECTO
      foco.innerHTML = isActivo ? svgActivo : svgInactivo;
      
      foco.dataset.nombre = testimonio.nombre;
      foco.dataset.edad = testimonio.edad;
      foco.dataset.frase = testimonio.frase;

      // Layout: Distribución Gaussiana (Campana)
      const x = rect.width * ((Math.random() + Math.random() + Math.random()) / 3);
      const y = rect.height * ((Math.random() + Math.random() + Math.random()) / 3);

      foco.style.left = `${x}px`;
      foco.style.top = `${y}px`;

      foco.addEventListener('mouseenter', handleMouseEnter);
      foco.addEventListener('mouseleave', handleMouseLeave);
      
      return foco;
    }

    // 5. NAVEGACIÓN
    btnPrev.addEventListener('click', () => {
      currentFacIndex = (currentFacIndex - 1 + facultades.length) % facultades.length;
      renderFaculty();
    });

    btnNext.addEventListener('click', () => {
      currentFacIndex = (currentFacIndex + 1) % facultades.length;
      renderFaculty();
    });

    // 6. INTERACCIÓN HOVER & TOOLTIP
    function handleMouseEnter(e) {
      const foco = e.currentTarget;
      const isActivo = foco.classList.contains('activo');
      
      const estadoStr = isActivo ? 'ACTIVO' : 'BAJA';
      ttNombre.textContent = `${foco.dataset.nombre}, ${foco.dataset.edad} AÑOS — ${estadoStr}`;
      ttFrase.textContent = `"${foco.dataset.frase}"`;
      
      if(!isActivo) tooltip.classList.add('inactivo-style');
      else tooltip.classList.remove('inactivo-style');

      const randomRot = (Math.random() * 6 - 3).toFixed(2);
      const rect = foco.getBoundingClientRect();
      
      let ttX = rect.right + 15; 
      let ttY = rect.top - 10;

      if (ttX + 280 > window.innerWidth) ttX = rect.left - 290; 
      if (ttY < 80) ttY = 80;
      if (ttY + tooltip.offsetHeight > window.innerHeight - 80) {
        ttY = window.innerHeight - tooltip.offsetHeight - 90;
      }

      tooltip.style.left = `${ttX}px`;
      tooltip.style.top = `${ttY}px`;
      tooltip.style.transform = `rotate(${randomRot}deg)`;
      tooltip.classList.add('show');
    }

    function handleMouseLeave() { tooltip.classList.remove('show'); }

    // 7. PARTICIPACIÓN FORMULARIO
    const form = document.getElementById('form-experiencia');
    const inputNombre = document.getElementById('input-nombre');
    const inputEdad = document.getElementById('input-edad');
    const inputFrase = document.getElementById('input-frase');
    const inputEstado = document.getElementById('input-estado');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const nombre = inputNombre.value.trim();
      const edad = inputEdad.value.trim();
      const frase = inputFrase.value.trim();
      const isActivo = inputEstado.checked;
      
      if(!nombre || !edad || !frase) return;

      const rect = cloudArea.getBoundingClientRect();
      
      const testimonio = { nombre, edad, frase };
      
      const nuevoFoco = createFocoDOM(testimonio, isActivo, rect);
      nuevoFoco.style.left = `${rect.width / 2 + (Math.random() * 60 - 30)}px`;
      nuevoFoco.style.top = `${rect.height / 2 + (Math.random() * 60 - 30)}px`;
      
      cloudArea.appendChild(nuevoFoco);

      if (isActivo) {
        facultades[currentFacIndex].activos++;
        countActivos.textContent = facultades[currentFacIndex].activos;
      } else {
        facultades[currentFacIndex].inactivos++;
        countInactivos.textContent = facultades[currentFacIndex].inactivos;
      }
      
      setTimeout(() => {
        nuevoFoco.classList.add('hovered');
        handleMouseEnter({ currentTarget: nuevoFoco });
        
        setTimeout(() => {
          nuevoFoco.classList.remove('hovered');
          tooltip.classList.remove('show');
        }, 3500);
      }, 100);

      inputNombre.value = "";
      inputEdad.value = "";
      inputFrase.value = "";
    });

    window.addEventListener('DOMContentLoaded', init);
    
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => { renderFaculty(); }, 250);
    });
  </script>
</body>
</html>
